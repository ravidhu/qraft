# Shared infrastructure for Qraft examples
# Each example includes this file and adds its own source database.
#
# Usage from an example directory:
#   include:
#     - path: ../datalakehouse_trino/docker-compose.base.yml

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/warehouse --ignore-existing;
      exit 0;
      "

  metadata_db:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: iceberg
      POSTGRES_USER: qraft
      POSTGRES_PASSWORD: qraft
    volumes:
      - ./metadata_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qraft -d iceberg"]
      interval: 5s
      retries: 5

  trino:
    image: trinodb/trino:480
    ports:
      - "8080:8080"
    volumes:
      - ./catalog:/etc/trino/catalog
