services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: source
      POSTGRES_USER: qraft
      POSTGRES_PASSWORD: qraft
    volumes:
      - ./docker:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qraft -d source"]
      interval: 5s
      retries: 5
